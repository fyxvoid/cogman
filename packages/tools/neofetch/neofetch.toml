[identity]
name     = "neofetch"
version  = "7.1.0"
category = "tools"
summary  = "Fast, highly customisable system info script"

[identity.source]
kind = "tarball"
file = "neofetch-7.1.0.tar.gz"

[identity.depends]
build   = []
runtime = []

[build]
system = "make"
steps  = [
    "tar -xzf tar/neofetch-7.1.0.tar.gz",
]

[installer]
steps = [
    "make -C neofetch-7.1.0 PREFIX=$PKGROOT/usr install",
]

[installer.verify]
expected_files = [
    "usr/bin/neofetch",
    "usr/share/man/man1/neofetch.1",
]

[policy.filesystem]
read  = ["/"]
write = ["/"]
